<!--
  Screen: I — [BCP App] Dose Rounds (specs/BCP+App_+Dose+Rounds.md)
  The landing screen. Lists the dose round time blocks for the selected day
  (previous / current / future day). Tapping a block opens the Main Dose Round
  screen (II). A Special Dose Round section appears only when a resident has a
  special dose round. An "Out of Dose Round" button sits beside the heading.

  Built against components.md v3 (Button, Badge, tokens). Dose-round tiles and the
  day switcher are layout primitives (Card/Tabs not in v3's five) — see flags.

  ==== SPEC / DESIGN-SYSTEM FLAGS ====
  1. Dose-round status colours "reflect what is currently in the web application" —
     those exact colours are NOT in design-tokens.md. Mapped to semantic states:
     Open = brand (active), Closed = muted/disabled, Upcoming = neutral outline.
     Status is ALSO carried by a text label on each tile (accessibility.md — never
     status by colour alone). Confirm the real web-app palette before finalising.
  2. Round times: open and future rounds show start/finish window in brackets
     (spec). Closed rounds show the block time only.
  3. Time Remaining appears on a round only in its last 30 min (countdown is static
     here; live countdown + auto-close at 00:00 are JS — accessibility.md conflict
     re: timed state changes on medication status, flagged as on screen II).
  4. Special Dose Round section: shown populated here; when no resident has a
     special dose round the whole section is omitted (commented empty-state note).
  5. Continuous Infusion is not supported (spec) — no such block rendered.
  6. Day switcher (prev/current/future) built from primitives; Tabs/Date controls
     not yet extracted in v3.
-->
<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dose Rounds — BestDOSE</title>
<style>
  :root {
    --text-primary: #181D27; --text-secondary: #414651; --text-tertiary: #535862;
    --text-disabled: #717680; --text-white: #FFFFFF; --text-brand-primary: #003B95;
    --text-error-primary: #CD1719; --text-warning-primary: #F08F00; --text-success-primary: #067242;
    --border-primary: #D0D4DC; --border-secondary: #EEEFF2; --border-brand: #003B95;
    --bg-primary: #FFFFFF; --bg-secondary: #F7F7F9; --bg-tertiary: #EEEFF2;
    --bg-brand-primary: #E0EEFF; --bg-brand-solid: #003B95; --bg-brand-solid_hover: #022664;
    --font-family-base: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    --text-xs: 12px; --text-xs-lh: 18px; --text-sm: 14px; --text-sm-lh: 20px;
    --text-md: 16px; --text-md-lh: 24px; --text-lg: 18px; --text-lg-lh: 28px;
    --text-xl: 20px; --text-xl-lh: 30px; --display-xs: 24px; --display-xs-lh: 32px;
    --display-sm: 30px; --display-sm-lh: 38px;
    --spacing-xs: 4px; --spacing-sm: 6px; --spacing-md: 8px; --spacing-lg: 12px;
    --spacing-xl: 16px; --spacing-2xl: 20px; --spacing-3xl: 24px; --spacing-4xl: 32px;
    --radius-sm: 6px; --radius-md: 8px; --radius-full: 9999px;
    --shadow-sm: 0 1px 6px rgba(0,0,0,0.1);
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: var(--font-family-base); color: var(--text-primary); background: var(--bg-secondary); }
  .visually-hidden { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
  .skip-link { position: absolute; left: var(--spacing-md); top: -48px; background: var(--bg-brand-solid); color: var(--text-white); padding: var(--spacing-md) var(--spacing-lg); border-radius: var(--radius-md); z-index: 10; }
  .skip-link:focus { top: var(--spacing-md); }

  .btn { display: inline-flex; align-items: center; justify-content: center; gap: var(--spacing-xs); border-radius: var(--radius-md); font-family: inherit; font-weight: 600; cursor: pointer; border: 1px solid transparent; white-space: nowrap; }
  .btn--lg { height: 44px; padding: 10px 16px; font-size: var(--text-md); }
  .btn--secondary { background: var(--bg-primary); color: var(--text-brand-primary); border-color: var(--border-primary); }
  .btn--secondary:hover { background: var(--bg-tertiary); }
  .btn:focus-visible { outline: 2px solid var(--text-brand-primary); outline-offset: 2px; }

  .app-header { padding: var(--spacing-lg) var(--spacing-xl); background: var(--bg-primary); border-bottom: 1px solid var(--border-secondary); }
  .app-header__brand { font-size: var(--text-lg); font-weight: 700; margin: 0; }

  .page { max-width: 1280px; margin: 0 auto; padding: var(--spacing-3xl) var(--spacing-xl); }
  .page-head { display: flex; align-items: center; justify-content: space-between; gap: var(--spacing-lg); flex-wrap: wrap; margin-bottom: var(--spacing-xl); }
  .page-head__title { font-size: var(--display-sm); line-height: var(--display-sm-lh); font-weight: 700; margin: 0; }

  /* Day switcher */
  .day-switch { display: flex; align-items: center; gap: var(--spacing-md); margin-bottom: var(--spacing-3xl); }
  .day-switch__btn { display: inline-flex; align-items: center; justify-content: center; width: 44px; height: 44px; border: 1px solid var(--border-primary); background: var(--bg-primary); border-radius: var(--radius-md); color: var(--text-primary); cursor: pointer; }
  .day-switch__btn:hover { background: var(--bg-tertiary); }
  .day-switch__btn:focus-visible { outline: 2px solid var(--text-brand-primary); outline-offset: 2px; }
  .day-switch__label { font-size: var(--text-lg); font-weight: 600; min-width: 220px; text-align: center; }
  .day-switch__label small { display: block; font-size: var(--text-xs); font-weight: 400; color: var(--text-tertiary); }

  .section-title { font-size: var(--display-xs); line-height: var(--display-xs-lh); font-weight: 600; margin: var(--spacing-4xl) 0 var(--spacing-lg); }

  /* Dose round tiles */
  .rounds { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: var(--spacing-lg); }
  .round-tile { display: flex; flex-direction: column; gap: var(--spacing-md); padding: var(--spacing-xl); background: var(--bg-primary); border: 1px solid var(--border-primary); border-radius: var(--radius-md); text-align: left; font-family: inherit; cursor: pointer; text-decoration: none; color: inherit; }
  .round-tile:hover { border-color: var(--border-brand); background: var(--bg-secondary); }
  .round-tile:focus-visible { outline: 2px solid var(--text-brand-primary); outline-offset: 2px; }
  .round-tile__time { font-size: var(--display-xs); line-height: var(--display-xs-lh); font-weight: 700; }
  .round-tile__window { font-size: var(--text-sm); color: var(--text-tertiary); }
  .round-tile__foot { display: flex; align-items: center; justify-content: space-between; gap: var(--spacing-md); margin-top: var(--spacing-xs); }

  /* Status pill: dot (supplementary) + text label (carries meaning) */
  .status { display: inline-flex; align-items: center; gap: var(--spacing-sm); font-size: var(--text-xs); font-weight: 600; }
  .status__dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .status--open .status__dot { background: var(--text-success-primary); }
  .status--open { color: var(--text-success-primary); }
  .status--closed .status__dot { background: var(--text-disabled); }
  .status--closed { color: var(--text-disabled); }
  .status--upcoming .status__dot { background: var(--text-secondary); }
  .status--upcoming { color: var(--text-secondary); }

  /* Open tile emphasis (maps to web-app 'open' colour — flag #1) */
  .round-tile--open { border-color: var(--border-brand); border-width: 2px; }
  .round-tile--closed { background: var(--bg-secondary); }
  .round-tile--closed .round-tile__time { color: var(--text-disabled); }

  .time-remaining { display: inline-flex; align-items: center; gap: var(--spacing-xs); font-size: var(--text-xs); font-weight: 700; color: var(--text-brand-primary); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>

<a class="skip-link" href="#rounds">Skip to dose rounds</a>

<header class="app-header">
  <p class="app-header__brand">BestDOSE</p>
</header>

<main class="page">

  <div class="page-head">
    <h1 class="page-head__title">Dose Rounds</h1>
    <button type="button" class="btn btn--lg btn--secondary">Out of Dose Round</button>
  </div>

  <!-- Day switcher: previous / current / future day -->
  <div class="day-switch">
    <button type="button" class="day-switch__btn" aria-label="Previous day">
      <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M15 18l-6-6 6-6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <span class="day-switch__label">Today<small>Monday 20/07/2026</small></span>
    <button type="button" class="day-switch__btn" aria-label="Next day">
      <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M9 18l6-6-6-6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>

  <!-- Dose round tiles -->
  <section id="rounds" aria-label="Dose rounds for the selected day">
    <div class="rounds">
      <a class="round-tile round-tile--closed" href="#">
        <span class="round-tile__time">06:00</span>
        <span class="round-tile__window">Closed</span>
        <span class="round-tile__foot">
          <span class="status status--closed"><span class="status__dot" aria-hidden="true"></span>Closed</span>
        </span>
      </a>
      <a class="round-tile round-tile--open" href="#">
        <span class="round-tile__time">08:00</span>
        <span class="round-tile__window">(07:30 &ndash; 09:30)</span>
        <span class="round-tile__foot">
          <span class="status status--open"><span class="status__dot" aria-hidden="true"></span>Open</span>
          <span class="time-remaining"><span class="visually-hidden">Time remaining </span>12:34</span>
        </span>
      </a>
      <a class="round-tile" href="#">
        <span class="round-tile__time">12:00</span>
        <span class="round-tile__window">(11:30 &ndash; 13:30)</span>
        <span class="round-tile__foot">
          <span class="status status--upcoming"><span class="status__dot" aria-hidden="true"></span>Upcoming</span>
        </span>
      </a>
      <a class="round-tile" href="#">
        <span class="round-tile__time">18:00</span>
        <span class="round-tile__window">(17:30 &ndash; 19:30)</span>
        <span class="round-tile__foot">
          <span class="status status--upcoming"><span class="status__dot" aria-hidden="true"></span>Upcoming</span>
        </span>
      </a>
      <a class="round-tile" href="#">
        <span class="round-tile__time">22:00</span>
        <span class="round-tile__window">(21:30 &ndash; 23:30)</span>
        <span class="round-tile__foot">
          <span class="status status--upcoming"><span class="status__dot" aria-hidden="true"></span>Upcoming</span>
        </span>
      </a>
    </div>
  </section>

  <!-- Special Dose Round — shown only when a resident has a special dose round.
       Omit the whole section (heading included) when none exist. -->
  <h2 class="section-title">Special Dose Round</h2>
  <section aria-label="Special dose rounds">
    <div class="rounds">
      <a class="round-tile" href="#">
        <span class="round-tile__time">10:30</span>
        <span class="round-tile__window">(10:00 &ndash; 11:00)</span>
        <span class="round-tile__foot">
          <span class="status status--upcoming"><span class="status__dot" aria-hidden="true"></span>Upcoming</span>
        </span>
      </a>
    </div>
  </section>

</main>

</body>
</html>
